<!DOCTYPE html>
<html>
    <head>
        <script src="https://cdn.tailwindcss.com"></script>
        <title>Match Details</title>
    </head>
    <body>
        <h1>Match Details</h1>
        <p><strong>{{ match.player1 }}</strong> {{ match.player1_score }} - {{ match.player2_score }} <strong>{{ match.player2 }}</strong></p>
        <p>Winner: {{ match.winner }}</p>
        <p>Date played: {{ match.date_played }}</p>
    </body>

    <form method="POST" action="/match/{{ match.id }}/delete" onsubmit="return confirm('Are you sure you want to delete this match?');">
        <button type="submit">Delete Match</button>
    </form>

    <a href="/">Back to Home</a>

</html>
