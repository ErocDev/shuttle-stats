<!DOCTYPE html>
<html>
<head>
    <title>Match Detail</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-8">
    <div class="max-w-lg w-full bg-white rounded-xl shadow p-6">
        <h1 class="text-2xl font-bold text-gray-800 mb-4">Match Detail</h1>

        <div class="text-lg mb-2">
            <span class="font-semibold">{{ match.player1 }}</span>
            <span class="text-gray-500 mx-1">{{ match.player1_score }} - {{ match.player2_score }}</span>
            <span class="font-semibold">{{ match.player2 }}</span>
        </div>
        <p class="text-indigo-600 font-medium mb-1">Winner: {{ match.winner }}</p>
        <p class="text-gray-500 text-sm mb-6">Played on {{ match.date_played }}</p>

        <form method="POST" action="/match/{{ match.id }}/delete"
              onsubmit="return confirm('Are you sure you want to delete this match?');">
            <button type="submit" class="w-full bg-red-500 text-white py-2 rounded-lg hover:bg-red-600 font-medium">Delete Match</button>
        </form>

        <a href="/" class="block text-center text-indigo-600 hover:text-indigo-800 mt-4">Back to home</a>
    </div>
</body>
</html>
