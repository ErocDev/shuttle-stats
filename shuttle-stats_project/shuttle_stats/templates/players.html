<!DOCTYPE html>
<html>
<head>
    <title>Manage Players</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-8">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow p-6">
        <h1 class="text-2xl font-bold text-gray-800 mb-4">Manage Players</h1>

        <form method="POST" class="flex gap-2 mb-6">
            <input type="text" name="name" required placeholder="New player name"
                   class="flex-1 border border-gray-300 rounded-lg px-3 py-2">
            <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 font-medium">Add</button>
        </form>

        <h2 class="text-lg font-semibold text-gray-800 mb-2">Current Players</h2>
        <ul class="space-y-2">
            {% for player in players %}
                <li class="flex justify-between items-center border border-gray-100 rounded-lg px-3 py-2">
                    <span>{{ player.name }}</span>
                    <form method="POST" action="/players/{{ player.id }}/delete"
                          onsubmit="return confirm('Delete this player?');">
                        <button type="submit" class="text-red-500 hover:text-red-700 text-sm font-medium">Delete</button>
                    </form>
                </li>
            {% endfor %}
        </ul>

        <a href="/" class="block text-center text-indigo-600 hover:text-indigo-800 mt-6">Back to home</a>
    </div>
</body>
</html>
